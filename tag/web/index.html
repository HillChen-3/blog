  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    // Bottom nav menu
    const menuToggle = document.getElementById('menuToggle');
    const menuContainer = document.getElementById('menuContainer');
    const menuItems = document.getElementById('menuItems');
    const menuBg = document.getElementById('menuBg');
    const menuLabel = document.getElementById('menuLabel');
    const bar1 = document.getElementById('menuBar1');
    const bar2 = document.getElementById('menuBar2');
    let menuOpen = false;

    menuToggle.addEventListener('click', () => {
      menuOpen = !menuOpen;
      if (menuOpen) {
        menuBg.style.transform = 'translateX(-50%) scale(1)';
        menuLabel.style.color = '#f7f1ed';
        bar1.style.background = '#f7f1ed';
        bar2.style.background = '#f7f1ed';
        bar1.style.transform = 'translateY(0) rotate(45deg)';
        bar2.style.transform = 'translateY(0) rotate(-45deg)';
        menuItems.style.pointerEvents = 'auto';
        menuItems.style.opacity = '1';
        menuItems.style.maxHeight = '300px';
      } else {
        menuBg.style.transform = 'translateX(-50%) scale(0)';
        menuLabel.style.color = '#242424';
        bar1.style.background = '#242424';
        bar2.style.background = '#242424';
        bar1.style.transform = 'translateY(-4px) rotate(0)';
        bar2.style.transform = 'translateY(4px) rotate(0)';
        menuItems.style.pointerEvents = 'none';
        menuItems.style.opacity = '0';
        menuItems.style.maxHeight = '0';
      }
    });

    // Scroll animations using Intersection Observer
    const observerOptions = { threshold: 0.1, rootMargin: '0px 0px -50px 0px' };

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-revealed');
        }
      });
    }, observerOptions);

    document.querySelectorAll('.reveal-up, .reveal-scale, .reveal-clip').forEach(el => {
      revealObserver.observe(el);
    });

    // Letter-by-letter reveal
    const letterObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const letters = entry.target.querySelectorAll('.letter-reveal');
          letters.forEach((letter, i) => {
            setTimeout(() => {
              letter.classList.add('is-revealed');
            }, i * 50);
          });
        }
      });
    }, observerOptions);

    document.querySelectorAll('.letter-container').forEach(el => {
      letterObserver.observe(el);
    });

    // Vertical line animation on scroll
    const lineLeft = document.getElementById('lineLeft');
    const lineRight = document.getElementById('lineRight');
    let lineAnimated = false;

    window.addEventListener('scroll', () => {
      if (!lineAnimated && window.scrollY > 100) {
        lineLeft.style.transform = 'scaleY(1)';
        lineRight.style.transform = 'scaleY(1)';
        lineLeft.style.transition = 'transform 1.2s cubic-bezier(0.22,1,0.36,1)';
        lineRight.style.transition = 'transform 1.2s cubic-bezier(0.22,1,0.36,1)';
        lineAnimated = true;
      }
    });

    // Bottom nav entrance animation
    setTimeout(() => {
      const nav = document.getElementById('bottomNav');
      nav.style.opacity = '1';
      nav.style.transform = 'translateX(-50%) translateY(0)';
      nav.style.transition = 'opacity 0.8s ease, transform 0.8s cubic-bezier(0.22,1,0.36,1)';
    }, 2000);
  </script>
