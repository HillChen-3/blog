  <script>
    // Dark mode toggle
    const darkToggle = document.getElementById('darkToggle');
    const html = document.documentElement;
    if (localStorage.getItem('dark') === 'true' || (!localStorage.getItem('dark') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
    }
    darkToggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('dark', html.classList.contains('dark'));
    });

    // 3D Scene parallax
    const BOUNDS = 50;
    document.addEventListener('pointermove', e => {
      const rx = ((e.clientY / window.innerHeight) * 2 - 1) * -BOUNDS;
      const ry = ((e.clientX / window.innerWidth) * 2 - 1) * BOUNDS;
      document.documentElement.style.setProperty('--rx', rx);
      document.documentElement.style.setProperty('--ry', ry);
    });
  </script>
