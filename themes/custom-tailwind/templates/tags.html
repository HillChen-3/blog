{% extends "base.html" %}
{% block title %}Tags — {{ SITENAME }}{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-16">
  <header class="text-center mb-12">
    <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white">Tags</h1>
    <p class="mt-2 text-slate-500 dark:text-slate-400">Browse articles by tag</p>
  </header>
  <div class="flex flex-wrap justify-center gap-3">
    {% for tag, articles in tags %}
    <a href="{{ SITEURL }}/{{ tag.url }}" class="tag text-base px-4 py-2">{{ tag }} ({{ articles|length }})</a>
    {% endfor %}
  </div>
</section>
{% endblock %}
