{% extends "base.html" %}
{% block title %}Categories — {{ SITENAME }}{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-16">
  <header class="text-center mb-12">
    <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white">Categories</h1>
    <p class="mt-2 text-slate-500 dark:text-slate-400">Browse articles by category</p>
  </header>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    {% for cat, articles in categories %}
    <a href="{{ SITEURL }}/{{ cat.url }}" class="card p-6 flex items-center justify-between group hover:border-primary-300 dark:hover:border-primary-700">
      <span class="text-lg font-semibold text-slate-900 dark:text-white group-hover:text-primary-600 dark:group-hover:text-primary-400">{{ cat }}</span>
      <span class="text-sm font-medium text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full">{{ articles|length }}</span>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
