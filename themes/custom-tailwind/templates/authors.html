{% extends "base.html" %}
{% block title %}Authors — {{ SITENAME }}{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-16">
  <header class="text-center mb-12">
    <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white">Authors</h1>
  </header>
  <div class="space-y-4">
    {% for author, articles in authors %}
    <a href="{{ SITEURL }}/{{ author.url }}" class="card p-5 flex items-center justify-between group">
      <span class="text-lg font-semibold text-slate-900 dark:text-white group-hover:text-primary-600">{{ author }}</span>
      <span class="text-sm text-slate-400">{{ articles|length }} articles</span>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
