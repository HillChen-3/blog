{% extends "base.html" %}
{% block title %}{{ page.title }} — {{ SITENAME }}{% endblock %}

{% block content %}
<article class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-16">
  <header class="mb-10">
    <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white">{{ page.title }}</h1>
  </header>
  <div class="prose prose-lg dark:prose-invert max-w-none">
    {{ page.content }}
  </div>
</article>
{% endblock %}
